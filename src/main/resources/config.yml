  title-ban-duration: "&8Выберите срок"
  title-reason: "&8Выберите причину"
  title-confirm: "&8Подтверждение"
  title-assign-group: "&8Назначить группу"
  title-inventory-view: "&8Инвентарь: %player%"
  title-ender-chest: "&8Эндер-сундук: %player%"
